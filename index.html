<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Showdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      opacity: 0.2;
      transition: opacity 0.3s ease;
    }

    html:hover {
      opacity: 1;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;   /* let OS transparency show through */
      font-family: sans-serif;
      user-select: none;
    }

    /* Drag region so the user can move the frameless window */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 30px;
      background: rgba(22, 33, 62, 0.85);  /* semi-transparent dark bar */
      -webkit-app-region: drag;
      padding: 0 8px;
      flex-shrink: 0;
    }

    #titlebar span {
      color: #e2e2e2;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Buttons must opt out of dragging so clicks register */
    #titlebar .controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    #titlebar .controls button {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 0;
      transition: opacity 0.15s;
    }

    #titlebar .controls button:hover {
      opacity: 0.75;
    }

    #btn-close  { background: #ff5f57; }
    #btn-min    { background: #febc2e; }
    #btn-reload { background: #28c840; }

    #webview-container {
      width: 100%;
      height: calc(100% - 30px);
    }

    webview {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <span>⚡ Pokémon Showdown</span>
    <div class="controls">
      <button id="btn-reload" title="Reload"></button>
      <button id="btn-min"    title="Minimize"></button>
      <button id="btn-close"  title="Close"></button>
    </div>
  </div>

  <div id="webview-container">
    <webview
      id="ps-view"
      src="https://play.pokemonshowdown.com"
      allowpopups
    ></webview>
  </div>

  <script>
    document.getElementById('btn-close').addEventListener('click', () => {
      window.electronAPI.close();
    });

    document.getElementById('btn-min').addEventListener('click', () => {
      window.electronAPI.minimize();
    });

    document.getElementById('btn-reload').addEventListener('click', () => {
      document.getElementById('ps-view').reload();
    });
  </script>
</body>
</html>
